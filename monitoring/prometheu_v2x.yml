# Configuración para Prometheus Scraper V2X sobre 5G
# Guarda este archivo o añade su contenido al /etc/prometheus/prometheus.yml de tu VM Ubuntu

global:
  scrape_interval: 2s     # Frecuencia de muestreo rápida para tiempo real (2s)
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'v2x_ue1'
    scrape_interval: 2s
    static_configs:
      - targets: ['localhost:8001']
        labels:
          ue_label: 'ue1'

  - job_name: 'v2x_ue2'
    scrape_interval: 2s
    static_configs:
      - targets: ['localhost:8002']
        labels:
          ue_label: 'ue2'
