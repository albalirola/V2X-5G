[rf]
freq_offset = 0
tx_gain = 90
rx_gain = 60
srate = 11.52e6
nof_antennas = 1
device_name = zmq
device_args = tx_port=tcp://127.0.0.1:2001,rx_port=tcp://127.0.0.1:2000,base_srate=11.52e6

[rat.eutra]
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1

[rrc]
release = 15
ue_category = 4

[usim]
mode = soft
algo = milenage
imsi = 001010000000001
k = 11111111111111111111111111111111
opc = 11111111111111111111111111111111
imei = 353490069873319

[nas]
apn = internet
apn_protocol = ipv4

[gw]
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false

[pcap]
enable = none
mac_filename = /tmp/ue_mac.pcap
mac_nr_filename = /tmp/ue_mac_nr.pcap
nas_filename = /tmp/ue_nas.pcap

[log]
all_level = debug
phy_lib_level = none
all_hex_limit = 32
filename = /tmp/ue.log
file_max_size = -1
